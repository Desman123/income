<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistem Keuangan Perusahaan</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table th,table td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

table th{
background:#2563eb;
color:white;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin:20px 0;
}

.box{
padding:15px;
border-radius:8px;
color:white;
}

.income{
background:#16a34a;
}

.expense{
background:#dc2626;
}

.balance{
background:#7c3aed;
}

#dashboard{
display:none;
}

@media(max-width:768px){

table{
font-size:12px;
}

}

</style>

</head>
<body>

<div class="container">

<div id="loginBox" class="card">

<h2>Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Masuk</button>

</div>

<div id="dashboard">

<div class="card">

<h2>Dashboard Keuangan</h2>

<div class="summary">

<div class="box income">
<h3>Pemasukan</h3>
<p id="income">Rp0</p>
</div>

<div class="box expense">
<h3>Pengeluaran</h3>
<p id="expense">Rp0</p>
</div>

<div class="box balance">
<h3>Saldo</h3>
<p id="balance">Rp0</p>
</div>

</div>

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Keterangan</th>
<th>Pemasukan</th>
<th>Pengeluaran</th>
</tr>
</thead>

<tbody id="dataTable">
</tbody>

</table>

</div>

</div>

</div>

<script>

const USER_URL =
"https://opensheet.elk.sh/SPREADSHEET_ID/Users";

const DATA_URL =
"https://opensheet.elk.sh/SPREADSHEET_ID/Keuangan";

async function login(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

let users = await fetch(USER_URL);
users = await users.json();

let user = users.find(
u =>
u.username === username &&
u.password === password
);

if(user){

document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";

loadFinance();

}else{

alert("Username atau password salah");

}

}

async function loadFinance(){

let res = await fetch(DATA_URL);
let data = await res.json();

let html = "";

let income = 0;
let expense = 0;

data.forEach(item=>{

income += Number(item.pemasukan);
expense += Number(item.pengeluaran);

html += `
<tr>
<td>${item.tanggal}</td>
<td>${item.keterangan}</td>
<td>Rp ${Number(item.pemasukan).toLocaleString()}</td>
<td>Rp ${Number(item.pengeluaran).toLocaleString()}</td>
</tr>
`;

});

document.getElementById("dataTable").innerHTML = html;

document.getElementById("income").innerText =
"Rp " + income.toLocaleString();

document.getElementById("expense").innerText =
"Rp " + expense.toLocaleString();

document.getElementById("balance").innerText =
"Rp " + (income-expense).toLocaleString();

}

</script>

</body>
</html>
