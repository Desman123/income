<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=0.1">

<title>Sistem Keuangan</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

button{
width:100%;
padding:12px;
background:#1976d2;
color:white;
border:none;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
overflow-x:auto;
display:block;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container" id="loginBox">

<h2>Login Sistem Keuangan</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div class="container hidden" id="dashboard">

<h2>Data Keuangan</h2>

<table id="tbl">
<thead>
<tr>
<th>Tanggal</th>
<th>Keterangan</th>
<th>Pemasukan</th>
<th>Pengeluaran</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/DEPLOYMENT_ID/exec";

function login(){

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"login",
username:
document.getElementById("username").value,
password:
document.getElementById("password").value
})
})
.then(r=>r.json())
.then(data=>{

if(data.status){

document.getElementById("loginBox")
.classList.add("hidden");

document.getElementById("dashboard")
.classList.remove("hidden");

loadData();

}else{

alert("Login gagal");

}

});

}

function loadData(){

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"getData"
})
})
.then(r=>r.json())
.then(data=>{

let html="";

for(let i=1;i<data.length;i++){

html+=`
<tr>
<td>${data[i][0]}</td>
<td>${data[i][1]}</td>
<td>${data[i][2]}</td>
<td>${data[i][3]}</td>
</tr>
`;

}

document.querySelector("#tbl tbody")
.innerHTML=html;

});

}

</script>

</body>
</html>
